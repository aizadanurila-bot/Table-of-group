<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Айзада</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4a90e2, #e94e77);
            margin: 0;
            padding: 0;
        }

        .card {
            background: white;
            width: 300px;
            margin: 80px auto;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
            color: #333;
        }

        p {
            color: #666;
            margin: 6px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: #4a90e2;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }

        .btn:hover {
            background: #357abd;
        }
    </style>

</head>
<body>

<div class="card">
    <img src="me.jpg" alt="Айзада">

    <h1>Бектемір Айзада</h1>

    <p>📍 Атбасар</p>
    <p>🎓 Студентка</p>
    <p>💖 Интересы: музыка, учеба, общение</p>

    <a href="index.html" class="btn">← Назад</a>
</div>

</body>
</html>
